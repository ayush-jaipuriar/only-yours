<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .serif-italic { font-family: 'Newsreader', serif; font-style: italic; }
        .text-glow { text-shadow: 0 0 15px rgba(255, 78, 123, 0.4); }
        .bg-glow-radial {
            background: radial-gradient(circle at center, rgba(255, 46, 110, 0.12) 0%, transparent 70%);
        }
        .cta-gradient {
            background: linear-gradient(135deg, #FF3B78 0%, #FF2E6E 100%);
        }
        .glass-panel {
            background: rgba(34, 29, 48, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col overflow-hidden">
<!-- Top AppBar (Simplified for Onboarding) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-gradient-to-b from-surface to-transparent">
<button class="text-on-surface hover:opacity-80 transition-opacity active:scale-95">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<span class="text-2xl font-headline italic tracking-tight text-[#FFF7F6]">Only Yours</span>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="flex-1 flex flex-col items-center justify-center px-8 relative pt-16 pb-24">
<!-- Background Artistic Element -->
<div class="absolute inset-0 z-0 bg-glow-radial pointer-events-none"></div>
<!-- Hero Visual Section -->
<div class="w-full max-w-md aspect-[4/5] relative z-10 mb-8 rounded-[1.5rem] overflow-hidden">
<img alt="Cinematic illustration" class="w-full h-full object-cover" data-alt="Dreamy cinematic landscape with a glowing winding path leading through a starry midnight forest toward a soft pink horizon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA7Y7VmCLfghc9fu2-nCgaDEumPpQVoU3X6pq2JdYsgWY3LjWoYxC6nsUo-xaHjPC9FmLsJHe8A9RC0OwWv5libI63KwPt0uBfszNk70Dyt6TDAdXJcNbMZ6h5c58mXY5gYFHTTNRlPaCsFud-D4ZZ2phLMdJirJPCW02nCNtJ4gvmIEN-tqjG2lDU9ydss-JSU5HhiOxoY3e4o21U1-HpwIH-_vFT0iqLxQ6-Sel-UWqHesHWN42GImIX1M87yEwznxC0Hcn-kEuY"/>
<!-- Milestone Overlay Cards (Asymmetric Layout) -->
<div class="absolute inset-0 flex flex-col justify-end p-6 bg-gradient-to-t from-surface via-transparent to-transparent">
<div class="flex flex-col gap-3">
<div class="self-start glass-panel p-3 rounded-xl flex items-center gap-3 border border-outline-variant/15 transform -rotate-2">
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-[18px] text-on-primary-container" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<div>
<p class="text-[10px] uppercase tracking-wider font-label text-primary">Milestone reached</p>
<p class="text-xs font-medium">First Anniversary</p>
</div>
</div>
<div class="self-end glass-panel p-3 rounded-xl flex items-center gap-3 border border-outline-variant/15 transform rotate-1 translate-x-4">
<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-[18px] text-on-secondary-container" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div>
<p class="text-[10px] uppercase tracking-wider font-label text-secondary">New Badge</p>
<p class="text-xs font-medium">Deep Connection</p>
</div>
</div>
</div>
</div>
</div>
<!-- Text Content -->
<div class="w-full max-w-sm text-center z-10">
<h1 class="font-headline text-4xl md:text-5xl text-[#FFF7F6] leading-tight mb-4">
                Celebrate <span class="serif-italic">Your Bond</span>
</h1>
<p class="text-on-surface-variant font-body text-lg leading-relaxed px-4">
                Unlock milestones as you grow. Watch your relationship journey unfold in a private digital sanctuary made just for two.
            </p>
</div>
</main>
<!-- Bottom Action Area -->
<footer class="fixed bottom-0 left-0 w-full z-50 px-8 pb-10 pt-6 bg-gradient-to-t from-surface via-surface/90 to-transparent">
<div class="max-w-md mx-auto flex flex-col gap-6">
<!-- Progress Indicator -->
<div class="flex flex-col items-center gap-2">
<div class="flex gap-2 h-1 w-32 bg-surface-container-highest/40 rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-primary-container/40"></div>
<div class="h-full w-1/3 bg-primary-container/40"></div>
<div class="h-full w-1/3 bg-primary-container shadow-[0_0_8px_rgba(255,78,123,0.8)]"></div>
</div>
<span class="font-label text-[10px] uppercase tracking-widest text-secondary-fixed-dim">Step 3 of 3</span>
</div>
<!-- Primary CTA -->
<button class="cta-gradient w-full py-5 rounded-full text-on-primary-fixed font-label font-bold text-lg shadow-[0px_20px_40px_rgba(255,46,110,0.15)] hover:opacity-90 active:scale-95 transition-all duration-200 uppercase tracking-widest">
                Get Started
            </button>
</div>
</footer>
