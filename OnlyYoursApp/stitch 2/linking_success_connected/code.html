<!-- Cinematic Background Element -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[140%] h-[140%] cinematic-glow"></div>

<div class="absolute inset-0 bg-gradient-to-b from-surface/80 via-surface to-surface"></div>
</div>
<!-- Content Canvas -->
<main class="relative z-10 w-full max-w-md px-8 flex flex-col items-center text-center">
<!-- Connection Visual -->
<div class="relative mb-12 group">
<!-- Ambient Glow behind icon -->
<div class="absolute inset-0 blur-3xl bg-primary-container/20 scale-150 rounded-full"></div>
<div class="relative flex items-center justify-center">
<div class="w-32 h-32 rounded-full bg-surface-container-high flex items-center justify-center shadow-[0px_20px_40px_rgba(255,46,110,0.08)]">
<span class="material-symbols-outlined text-primary-container text-6xl" style="font-variation-settings: 'FILL' 1;">
                        favorite
                    </span>
<div class="absolute -right-2 -top-2 w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center border border-primary/20">
<span class="material-symbols-outlined text-secondary text-2xl">
                            link
                        </span>
</div>
</div>
</div>
</div>
<!-- Typography Anchor -->
<div class="space-y-4 mb-16">
<h1 class="font-headline italic text-4xl md:text-5xl text-on-surface tracking-tight leading-tight">
                You're Connected!
            </h1>
<p class="text-on-surface-variant font-body text-lg leading-relaxed max-w-[280px] mx-auto">
                Welcome to your private sanctuary. Your shared world starts now.
            </p>
</div>
<!-- Action Cluster -->
<div class="w-full space-y-6">
<!-- Primary CTA -->
<button class="w-full py-5 px-8 rounded-xl font-body font-bold text-white text-lg btn-gradient shadow-[0px_10px_30px_rgba(255,46,110,0.3)] active:scale-95 transition-all duration-200 uppercase tracking-widest flex items-center justify-center gap-3">
<span>Start Your First Game</span>
<span class="material-symbols-outlined text-xl">play_circle</span>
</button>
<!-- Secondary CTA -->
<a class="inline-block w-full py-4 text-secondary font-label font-medium text-sm tracking-widest uppercase hover:text-primary transition-colors active:scale-95" href="#">
                Go to Dashboard
            </a>
</div>
<!-- Bottom Detail -->
<div class="mt-20 flex flex-col items-center gap-4">
<div class="flex -space-x-3">
<div class="w-10 h-10 rounded-full border-2 border-surface bg-surface-container overflow-hidden">
<img alt="User 1" class="w-full h-full object-cover" data-alt="Close up portrait of a smiling woman with warm lighting and soft background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBBdiMvxusujLhex-MeOBRGgE786c-_K3OAie1EbfmZVAguTH6SplgUKpr-uzYeDy_fxZOZEBBpXMz3TG5FfeWoxHQGkPwGUTnVTyr0TEWtDI9uT_NS-hdyue5BMnRT8bAOQ8Ol8jqz-ZJdCDsXY38poicYARb06lgNJWCPlhWgS3CIK2759XJq7J3YSjR5XK1eC_8zuNTozxheCx7oZCiK38gnihrNhAe4mmQN3o0ivSlz6wJ9z4_pH7QFMpTwb9Z2cPKeQ3xX-vI"/>

</div>
</div>
<p class="text-[11px] font-label font-medium uppercase tracking-[0.2em] text-on-surface/40">
                Connection established
            </p>
</div>
</main>
<!-- Decorative Corner Accents -->
<div class="fixed top-0 left-0 w-64 h-64 bg-primary-container/5 blur-[120px] rounded-full -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
<div class="fixed bottom-0 right-0 w-96 h-96 bg-secondary/5 blur-[150px] rounded-full translate-x-1/3 translate-y-1/3 pointer-events-none"></div>
